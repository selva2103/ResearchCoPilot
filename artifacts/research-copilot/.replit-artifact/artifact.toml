kind = "web"
previewPath = "/"
title = "ResearchCoPilot"
version = "1.0.0"
id = "artifacts/research-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/", "/api/analyze", "/api/pubmed-test", "/api/transcript/download", "/api/transcript/summary", "/api/protein/summaries", "/api/protein/detail", "/api/protein/download"]
localPort = 5000

[services.development]
run = "pnpm --filter @workspace/research-copilot run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/research-copilot", "run", "build"]
run = "pnpm --filter @workspace/research-copilot run start"

[services.env]
PORT = "5000"
