kind = "web"
previewPath = "/"
title = "ResearchCoPilot"
version = "1.0.0"
id = "artifacts/research-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/", "/api/analyze", "/api/pubmed-test"]
localPort = 20891

[services.development]
run = "pnpm --filter @workspace/research-copilot run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/research-copilot", "run", "build"]
run = "pnpm --filter @workspace/research-copilot run start"

[services.env]
PORT = "20891"
